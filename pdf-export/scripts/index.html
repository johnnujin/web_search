<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Export PDF</title>
    <style>
      body {
        font-family: -apple-system, sans-serif;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 32px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      }
      .icon { font-size: 48px; margin-bottom: 12px; }
      h2 { margin: 0 0 8px; font-size: 20px; color: #1a1a1a; }
      p { margin: 0 0 24px; color: #666; font-size: 14px; }
      button {
        background: #1a1a1a;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px 28px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        margin-bottom: 10px;
      }
      button:active { opacity: 0.8; }
      .success { color: #2d7a3a; font-weight: 600; margin-top: 16px; display: none; }
      .error { color: #c0392b; font-weight: 600; margin-top: 16px; display: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📄</div>
      <h2 id="doc-title">Your Document</h2>
      <p id="doc-preview">Ready to export</p>
      <button onclick="downloadHTML()">Download Document</button>
      <div class="success" id="success-msg">✓ Document ready!</div>
      <div class="error" id="error-msg"></div>
    </div>

    <script>
      let docTitle = "Document";
      let docContent = "";

      function downloadHTML() {
        try {
          const html = `<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>${docTitle}</title>
  <style>
    body { font-family: Georgia, serif; max-width: 700px; margin: 60px auto; padding: 0 20px; color: #222; line-height: 1.7; }
    h1 { font-size: 28px; border-bottom: 2px solid #eee; padding-bottom: 12px; }
    .date { color: #999; font-size: 13px; margin-bottom: 32px; }
    p { margin: 0 0 16px; }
  </style>
</head>
<body>
  <h1>${docTitle}</h1>
  <div class="date">${new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })}</div>
  ${docContent.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, "<br>")}</p>`).join("\n")}
</body>
</html>`;

          const blob = new Blob([html], { type: "text/html" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = docTitle.toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".html";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          document.getElementById("success-msg").style.display = "block";
        } catch (e) {
          const errEl = document.getElementById("error-msg");
          errEl.textContent = "Error: " + e.message;
          errEl.style.display = "block";
        }
      }

      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          let parsed;
          try {
            parsed = JSON.parse(data);
          } catch (e) {
            parsed = { title: "Document", content: String(data) };
          }

          docTitle = parsed.title || "Document";
          docContent = parsed.content || "";

          if (!docContent) {
            return JSON.stringify({ error: "No content provided to export." });
          }

          document.getElementById("doc-title").textContent = docTitle;
          const preview = docContent.substring(0, 80) + (docContent.length > 80 ? "..." : "");
          document.getElementById("doc-preview").textContent = preview;

          return JSON.stringify({
            success: true,
            message: `Document ready: "${docTitle}". Tap the Download button to save it.`,
          });
        } catch (e) {
          return JSON.stringify({ error: `Failed: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
