<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Search</title>
  </head>
  <body>
    <script>
      async function fetchWebSearch(query, apiKey) {
        const response = await fetch("https://google.serper.dev/search", {
          method: "POST",
          headers: {
            "X-API-KEY": apiKey,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ q: query, num: 5 }),
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        const results = [];

        if (data.answerBox) {
          results.push({
            title: data.answerBox.title || "Answer",
            link: data.answerBox.link || "",
            snippet: data.answerBox.answer || data.answerBox.snippet || "",
          });
        }

        if (Array.isArray(data.organic)) {
          for (const item of data.organic.slice(0, 5)) {
            results.push({
              title: item.title || "",
              link: item.link || "",
              snippet: item.snippet || "",
            });
          }
        }

        if (results.length === 0) {
          return { query: query, results: [], error: "No results found." };
        }

        return { query: query, results: results };
      }

      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          const jsonData = JSON.parse(data);
          if (!jsonData.query) {
            return JSON.stringify({ error: "No query provided to search." });
          }
          const apiKey = secret || "YOUR_API_KEY_HERE";
          if (!apiKey || apiKey === "YOUR_API_KEY_HERE") {
            return JSON.stringify({
              error: "No Serper.dev API key configured for this skill.",
            });
          }
          const searchResponse = await fetchWebSearch(jsonData.query, apiKey);
          return JSON.stringify(searchResponse);
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: `Web search failed: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
