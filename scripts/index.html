<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Search</title>
  </head>
  <body>
    <script>
      async function fetchWebSearch(query) {
        const url =
          "https://white-resonance-6aac.jnguyenabcd.workers.dev/?q=" +
          encodeURIComponent(query);
        const response = await fetch(url, { method: "GET" });
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return await response.json();
      }

      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          let query = "";

          // Handle both plain string and JSON object input
          try {
            const jsonData = JSON.parse(data);
            query = jsonData.query || jsonData.q || "";
          } catch (e) {
            // data is a plain string, use it directly
            query = data.trim();
          }

          if (!query) {
            return JSON.stringify({ error: "No query provided to search." });
          }

          const searchResponse = await fetchWebSearch(query);
          return JSON.stringify(searchResponse);
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: `Web search failed: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
