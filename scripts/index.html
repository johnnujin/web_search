<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Search</title>
  </head>
  <body>
    <script>
      async function fetchWebSearch(query) {
        const url =
          "https://white-resonance-6aac.jnguyenabcd.workers.dev/?q=" +
          encodeURIComponent(query);

        const response = await fetch(url, { method: "GET" });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        return await response.json();
      }

      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          const jsonData = JSON.parse(data);
          if (!jsonData.query) {
            return JSON.stringify({ error: "No query provided to search." });
          }
          const searchResponse = await fetchWebSearch(jsonData.query);
          return JSON.stringify(searchResponse);
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: `Web search failed: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
